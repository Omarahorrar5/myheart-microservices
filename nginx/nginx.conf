events { worker_connections 1024; }

http {
    include mime.types;
    default_type application/octet-stream;

    upstream patient_service    { server patient-service:8081; }
    upstream appointment_service { server appointment-service:8082; }
    upstream billing_service    { server billing-service:8083; }
    upstream prescription_service { server prescription-service:8084; }
    upstream lab_service        { server lab-service:8085; }
    upstream review_service     { server review-service:8086; }

    server {
        listen 80;

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
        }

        # API Routes
        location /api/patients {
            proxy_pass http://patient_service;
        }
        location /api/appointments {
            proxy_pass http://appointment_service;
        }
        location /api/bills {
            proxy_pass http://billing_service;
        }
        location /api/prescriptions {
            proxy_pass http://prescription_service;
        }
        location /api/lab-reports {
            proxy_pass http://lab_service;
        }
        location /api/reviews {
            proxy_pass http://review_service;
        }
    }
}
