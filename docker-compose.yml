version: '3.8'

services:

  # ─────────── DATABASES ───────────

  patient-db:
    image: postgres:15
    environment:
      POSTGRES_DB: patientdb
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: patient_pass
    volumes:
      - patient_data:/var/lib/postgresql/data
    networks: [myheart-net]

  appointment-db:
    image: postgres:15
    environment:
      POSTGRES_DB: appointmentdb
      POSTGRES_USER: appt_user
      POSTGRES_PASSWORD: appt_pass
    volumes:
      - appointment_data:/var/lib/postgresql/data
    networks: [myheart-net]

  billing-db:
    image: postgres:15
    environment:
      POSTGRES_DB: billingdb
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
    volumes:
      - billing_data:/var/lib/postgresql/data
    networks: [myheart-net]

  review-db:
    image: postgres:15
    environment:
      POSTGRES_DB: reviewdb
      POSTGRES_USER: review_user
      POSTGRES_PASSWORD: review_pass
    volumes:
      - review_data:/var/lib/postgresql/data
    networks: [myheart-net]

  prescription-db:
    image: mongo:7
    volumes:
      - prescription_data:/data/db
    networks: [myheart-net]

  lab-db:
    image: mongo:7
    volumes:
      - lab_data:/data/db
    networks: [myheart-net]

  # ─────────── SERVICES ───────────

  patient-service:
    build: ./patient-service
    depends_on: [patient-db]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/patientdb
      SPRING_DATASOURCE_USERNAME: patient_user
      SPRING_DATASOURCE_PASSWORD: patient_pass
    networks: [myheart-net]
    restart: on-failure

  appointment-service:
    build: ./appointment-service
    depends_on: [appointment-db]
    environment:
      DB_HOST: appointment-db
      DB_NAME: appointmentdb
      DB_USER: appt_user
      DB_PASS: appt_pass
    networks: [myheart-net]
    restart: on-failure

  billing-service:
    build: ./billing-service
    depends_on: [billing-db]
    environment:
      DB_HOST: billing-db
      DB_NAME: billingdb
      DB_USER: billing_user
      DB_PASS: billing_pass
    networks: [myheart-net]
    restart: on-failure

  prescription-service:
    build: ./prescription-service
    depends_on: [prescription-db]
    environment:
      MONGO_URL: mongodb://prescription-db:27017
    networks: [myheart-net]
    restart: on-failure

  lab-service:
    build: ./lab-service
    depends_on: [lab-db]
    environment:
      MONGO_URL: mongodb://lab-db:27017
    networks: [myheart-net]
    restart: on-failure

  review-service:
    build: ./review-service
    depends_on: [review-db]
    environment:
      DB_HOST: review-db
      DB_NAME: reviewdb
      DB_USER: review_user
      DB_PASS: review_pass
    networks: [myheart-net]
    restart: on-failure

  # ─────────── FRONTEND ───────────

  frontend:
    build: ./frontend
    networks: [myheart-net]
    restart: on-failure

  # ─────────── API GATEWAY ───────────

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - patient-service
      - appointment-service
      - billing-service
      - prescription-service
      - lab-service
      - review-service
      - frontend
    networks: [myheart-net]
    restart: on-failure

networks:
  myheart-net:
    driver: bridge

volumes:
  patient_data:
  appointment_data:
  billing_data:
  review_data:
  prescription_data:
  lab_data:
